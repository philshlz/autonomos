# autonomos allowlist proxy
# default deny. only hosts in allowlist.txt are reachable.
# every block is logged so it lands in the audit trail.

acl allowlist dstdomain "/etc/squid/allowlist.txt"
http_access allow allowlist
http_access deny all

http_port 3128

# log denied requests prominently so the audit pipeline can pick them up
access_log stdio:/dev/stdout
